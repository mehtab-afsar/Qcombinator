name: E2E Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        node-version: [18.x]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Build application
        run: npm run build

      - name: Start dev server
        run: npm run dev &
        env:
          NODE_ENV: test

      - name: Wait for server to be ready
        run: npx wait-on http://localhost:3000 --timeout 30000

      - name: Run Phase 1 - Critical Path Tests (Required)
        run: npx playwright test e2e/flows/

      - name: Run Phase 2 - API Route Tests
        run: npx playwright test e2e/api/
        continue-on-error: true

      - name: Run Phase 3 - Performance Tests
        run: npx playwright test e2e/performance/
        continue-on-error: true

      - name: Run Phase 4 - Security Tests
        run: npx playwright test e2e/security/
        continue-on-error: true

      - name: Run Phase 5 - Accessibility Tests
        run: npx playwright test e2e/accessibility/
        continue-on-error: true

      - name: Run Baseline Tests (Required)
        run: npx playwright test e2e/comprehensive-working.spec.ts
        if: always()

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload test videos
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-videos
          path: test-results/
          retention-days: 7

      - name: Report test summary
        if: always()
        run: |
          echo "## E2E Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Job status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Phase 1 (Critical Paths) and Baseline are required and gate this workflow." >> $GITHUB_STEP_SUMMARY
          echo "- Phases 2-5 (API, Performance, Security, Accessibility) are advisory; see the playwright-report artifact for their results." >> $GITHUB_STEP_SUMMARY

  quality-gates:
    runs-on: ubuntu-latest
    needs: e2e-tests

    steps:
      - name: Check test suite status
        run: |
          echo "E2E Test Suite Status"
          echo "===================="
          echo "Required gates (Phase 1 Critical Paths + Baseline) passed."
          echo "Advisory phases (API, Performance, Security, Accessibility)"
          echo "may contain failures — check the playwright-report artifact."

  deploy-check:
    runs-on: ubuntu-latest
    needs: quality-gates
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deployment readiness check
        run: |
          echo "Qcombinator Deployment Readiness"
          echo "================================="
          echo "Critical path E2E tests and baseline suite passed on main."
          echo "Status: gated checks green"
