name: CI

# ⚠️ This repo's default branch is `master`. There is no `main` and no `develop`.
# Until Phase 0 this workflow triggered only on [main, develop], so IT HAD NEVER
# RUN — not once. That is the root cause of the Phase 0 findings: three
# improvements shipped and orphaned their tests, a test contradicted its own
# mock, and billing had no test at all. Nothing was ever checking.
# Keep `master` first. Do not remove it.
#
# Work branches are matched by PATTERN, not by name. A named branch here rots the
# moment the next one is cut — `phase-0-**` would already have missed
# `story-1-mandate`, silently, which is precisely the failure above repeating
# itself one branch later. Name work branches `phase-*` or `story-*` and CI runs.
on:
  push:
    branches: [ master, main, develop, 'phase-**', 'story-**' ]
  pull_request:
    branches: [ master, main, develop ]

env:
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

jobs:
  # Fast gates — these fail in ~1 minute rather than after a 60-minute E2E run.
  unit-and-types:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # BLOCKING. Jest had never run in CI before Phase 0 — three separate
      # improvements shipped and orphaned their tests, and nobody knew.
      # Green at time of wiring: 202 passed / 0 failed / 12 suites.
      - name: Unit tests (Jest)
        run: npm test

      # BLOCKING. CLAUDE.md §6 requires "no new type errors"; until Phase 0
      # there was no script to check.
      # NOTE: a corrupt .next/dev/types/routes.d.ts can MASK real errors — a file
      # with syntax errors makes tsc bail before checking everything else. CI is
      # safe (fresh checkout, no .next). Locally, `rm -rf .next/dev` if tsc
      # reports errors inside .next.
      - name: Typecheck
        run: npm run typecheck

  e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: unit-and-types

    # ADVISORY, not blocking (decided 19 Jul 2026).
    #
    # These tests boot the REAL app (npm run start) and drive it, so they need a
    # live backend: Supabase + an Anthropic key. GitHub Actions has neither, so
    # the server refuses to start ("Server cannot start — missing required
    # environment variables") and every run fails before a single test executes.
    #
    # The BLOCKING gate is `unit-and-types` (Jest + typecheck) — those catch bugs
    # and need no backend. A red X that only means "CI has no database" trains
    # everyone to ignore CI, which is the exact disease Phase 0 cured. Green must
    # mean something.
    #
    # TO MAKE THIS BLOCKING AGAIN: stand up a dedicated TEST Supabase project,
    # run the migrations against it, add these as repo secrets —
    #   NEXT_PUBLIC_SUPABASE_URL, NEXT_PUBLIC_SUPABASE_ANON_KEY,
    #   SUPABASE_SERVICE_ROLE_KEY, ANTHROPIC_API_KEY (this last is NOT in the
    #   workflow env block yet — add it) — then delete continue-on-error and the
    #   skip guard below.
    continue-on-error: true

    steps:
      - name: Skip when no backend is configured
        id: backend
        run: |
          if [ -z "${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "No Supabase secret set — skipping E2E (advisory). See the job comment." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      # Every step below is guarded on the backend check: with no Supabase secret
      # the whole job is a clean no-op (skipped steps, ~seconds) rather than a
      # doomed 4-minute build that dies at server startup.
      - if: steps.backend.outputs.configured == 'true'
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: steps.backend.outputs.configured == 'true'
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        if: steps.backend.outputs.configured == 'true'
        run: npm ci

      - name: Install Playwright browsers
        if: steps.backend.outputs.configured == 'true'
        run: npx playwright install --with-deps

      - name: Build application
        if: steps.backend.outputs.configured == 'true'
        run: npm run build

      # E2E runs against the PRODUCTION build. This previously ran `npm run dev`,
      # so the build above was made and thrown away — the tested app was not the
      # shipped app.
      - name: Start production server
        if: steps.backend.outputs.configured == 'true'
        run: npm run start &
        env:
          NODE_ENV: production

      - name: Wait for server to be ready
        if: steps.backend.outputs.configured == 'true'
        run: npx wait-on http://localhost:3000 --timeout 60000

      - name: Run Phase 1 - Critical Path Tests (Required)
        if: steps.backend.outputs.configured == 'true'
        run: npx playwright test e2e/flows/

      # ── Phases 2-5 are still advisory. Read this before "just flipping them". ──
      #
      # Amendment A (Phase 0): flip these to blocking ONE AT A TIME, never all at
      # once, and quarantine any known failure EXPLICITLY on the tracked list in
      # PHASE0_AUDIT.md §8 — never by silently re-adding continue-on-error.
      #
      # They were NOT flipped during Phase 0 because their result could not be
      # observed: they need a live server plus real Supabase credentials, so
      # flipping them unverified would simply break CI for everyone on the next
      # push. Guessing is not hardening.
      #
      # The procedure, once a real CI run has been observed:
      #   1. Read the playwright-report artifact from a green-ish run.
      #   2. Pick ONE phase. Remove its continue-on-error. Push. Observe.
      #   3. Passes -> keep it blocking, move to the next phase.
      #      Fails   -> record each failing spec in PHASE0_AUDIT.md §8 with an
      #                 owner, then either fix it or skip that spec by name.
      #                 Do NOT restore continue-on-error for the whole phase.
      #   4. Repeat until all four are blocking.
      #
      # Tracked in PHASE0_AUDIT.md §8. Jest and typecheck (the unit-and-types job)
      # are already blocking and are the gates that matter most day to day.
      - name: Run Phase 2 - API Route Tests
        if: steps.backend.outputs.configured == 'true'
        run: npx playwright test e2e/api/
        continue-on-error: true

      - name: Run Phase 3 - Performance Tests
        if: steps.backend.outputs.configured == 'true'
        run: npx playwright test e2e/performance/
        continue-on-error: true

      - name: Run Phase 4 - Security Tests
        if: steps.backend.outputs.configured == 'true'
        run: npx playwright test e2e/security/
        continue-on-error: true

      - name: Run Phase 5 - Accessibility Tests
        if: steps.backend.outputs.configured == 'true'
        run: npx playwright test e2e/accessibility/
        continue-on-error: true

      - name: Run Baseline Tests (Required)
        if: steps.backend.outputs.configured == 'true'
        run: npx playwright test e2e/comprehensive-working.spec.ts

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always() && steps.backend.outputs.configured == 'true'
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload test videos
        uses: actions/upload-artifact@v4
        if: always() && steps.backend.outputs.configured == 'true'
        with:
          name: test-videos
          path: test-results/
          retention-days: 7

  # NOTE: quality-gates and deploy-check are echo-only. They assert nothing and
  # cannot fail — a green tick here means "the jobs above passed", nothing more.
  # Kept because branch protection may reference them by name. The real gates are
  # unit-and-types (Jest + typecheck) and e2e-tests (Phase 1 + Baseline).
  quality-gates:
    runs-on: ubuntu-latest
    needs: [unit-and-types, e2e-tests]

    steps:
      - name: Check test suite status
        run: |
          echo "BLOCKING gate passed: Jest (unit) + typecheck. These need no backend."
          echo ""
          echo "ADVISORY: the e2e-tests job. It boots the real app, which needs a"
          echo "Supabase + Anthropic backend CI does not have, so it is non-blocking"
          echo "and skips itself when no secret is configured. To make it a real gate,"
          echo "add a test backend — see the comment on the e2e-tests job."

  deploy-check:
    runs-on: ubuntu-latest
    needs: quality-gates
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'

    steps:
      - name: Deployment readiness check
        run: |
          echo "Qcombinator Deployment Readiness"
          echo "================================="
          echo "Unit tests, typecheck, critical-path E2E and baseline passed on main."
          echo "Status: gated checks green"
